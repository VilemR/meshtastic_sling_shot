[env:tbeam_z001]
extends = esp32_base
board = ttgo-t-beam
board_level = pr
board_check = true
lib_deps =
  ${esp32_base.lib_deps}
build_flags = 
  ${esp32_base.build_flags}
  -D TBEAM_V10
  -I variants/custom/tbeam_z001
  -DBOARD_HAS_PSRAM
  -mfix-esp32-psram-cache-issue
  -fno-lto
  -Os
  -D MESHTASTIC_EXCLUDE_MQTT=1
  -D MESHTASTIC_EXCLUDE_INPUTBROKER=1
  -D MESHTASTIC_EXCLUDE_CANNEDMESSAGES=1
  -D MESHTASTIC_EXCLUDE_INPUTBROKER=1
  -D MESHTASTIC_EXCLUDE_ENVIRONMENTAL_SENSOR=1
  -D MESHTASTIC_EXCLUDE_WEBSERVER=1
  -D HAS_TELEMETRY=0 
  -D USERPREFS_FILE=variants/custom/tbeam_z001/userPrefs.jsonc
upload_speed = 921600
